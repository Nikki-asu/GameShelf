{% extends "base.html" %}
{% block title %}Login — GameShelf{% endblock %}
{% block content %}
<div style="max-width:380px;margin:0 auto;">
    <div class="card">
        <div class="card-header">Log In</div>
        <div class="card-body">
            <form method="POST">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" autofocus required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required>
                </div>
                <button type="submit" class="btn btn-solid" style="width:100%">Log In</button>
            </form>
            <p style="margin-top:1rem;text-align:center;font-size:0.85rem;">
                New here? <a href="/register">Create an account</a>
            </p>
            <p style="margin-top:0.5rem;text-align:center;font-size:0.78rem;color:var(--text2);">
                Demo: username <code>demo</code> / password <code>demo123</code>
            </p>
        </div>
    </div>
</div>
{% endblock %}
